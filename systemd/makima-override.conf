# systemd drop-in override for makima.service shipped by makima-bin.
#
# Upstream unit has:
#   Environment="MAKIMA_CONFIG=/home//.config/makima"   <- empty username placeholder
#   User=                                                <- empty
#
# install.sh substitutes __USER__ with $USER at install time.
#
# Path on disk: /etc/systemd/system/makima.service.d/override.conf

[Service]
Environment=
Environment="MAKIMA_CONFIG=/home/__USER__/.config/makima"
User=__USER__
