# G903 thumb-button defaults for Hyprland.
#
# Mouse-side mapping (set by scripts/apply-defaults.sh):
#   ratbagctl button 3 -> KEY_F13   (bottom-left thumb)
#   ratbagctl button 4 -> KEY_F14   (top-left thumb)
#   ratbagctl button 5 -> KEY_F15   (bottom-right thumb)
#   ratbagctl button 6 -> KEY_F16   (top-right thumb)
#
# Verified via evtest: each thumb button emits exactly one clean key
# event (down/up) per click — no doubling, no missing presses.
# See docs/diagnostics.md for the methodology.
#
# Layout intent: left side = workspaces, right side = focus.
#                top = forward / next, bottom = back / previous.
#
# Using `code:N` (raw xkb scancode) instead of keysym names so the
# binds don't depend on which xkb keymap is active.
#   KEY_F13 -> 183 -> xkb code 191
#   KEY_F14 -> 184 -> xkb code 192
#   KEY_F15 -> 185 -> xkb code 193
#   KEY_F16 -> 186 -> xkb code 194

bind = , code:192, workspace, e+1      # top-left thumb (btn4)     -> next workspace
bind = , code:191, workspace, e-1      # bottom-left thumb (btn3)  -> previous workspace
bind = , code:194, movefocus, r        # top-right thumb (btn6)    -> focus right
bind = , code:193, movefocus, l        # bottom-right thumb (btn5) -> focus left

# Cursor warps to the focused window when switching workspaces.
# movefocus already warps by default (controlled by cursor:no_warps,
# which is false by default in Hyprland 0.55+).
cursor {
  warp_on_change_workspace = 1
}
