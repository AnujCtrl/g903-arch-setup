# G903 thumb-button defaults for Hyprland.
#
# Piper / ratbagctl maps the 4 modular thumb buttons to F13-F16:
#   Button 4 -> F13   (left side, lower)
#   Button 5 -> F14   (left side, upper)
#   Button 6 -> F15   (right side, lower)
#   Button 7 -> F16   (right side, upper)
#
# Left side = workspace navigation.
# Right side = focus navigation within the current workspace.
#
# If a physical button feels inverted after testing, flip the
# dispatcher arguments (e.g. e-1 <-> e+1, l <-> r). Don't reflash
# Piper just for orientation — the Hyprland side is the cheap edit.

bind = , F13, workspace, e-1     # left lower  -> previous workspace
bind = , F14, workspace, e+1     # left upper  -> next workspace
bind = , F15, movefocus, l       # right lower -> focus left
bind = , F16, movefocus, r       # right upper -> focus right

# Cursor warps to the focused window when switching workspaces.
# movefocus already warps by default (controlled by cursor:no_warps,
# which is false by default in Hyprland 0.55+).
cursor {
  warp_on_change_workspace = 1
}
