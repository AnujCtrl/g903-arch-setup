# G903 thumb-button defaults for Hyprland.
#
# Mouse-side mapping (set by scripts/apply-defaults.sh):
#   ratbagctl button 3 -> KEY_F13   (bottom-left thumb)
#   ratbagctl button 4 -> KEY_F14   (top-left thumb)
#   ratbagctl button 5 -> KEY_F15   (bottom-right thumb)
#   ratbagctl button 6 -> KEY_F16   (top-right thumb)
#
# Layout intent:
#   TOP row    -> workspaces (left/right)
#   BOTTOM row -> windows    (left/right, cycles through all windows in the workspace)
#
# Why `cyclenext` instead of `movefocus l/r`:
#   `movefocus l` does a strictly-directional move within Hyprland's
#   layout tree. With a vertical split, pressing left/right from the
#   top window can never reach the window below it. `cyclenext`
#   iterates all windows on the active workspace in tab order, so a
#   single pair of buttons covers every window regardless of layout.
#
# Using `code:N` (raw xkb scancode) instead of keysym names:
#   KEY_F13 -> 183 -> xkb code 191
#   KEY_F14 -> 184 -> xkb code 192
#   KEY_F15 -> 185 -> xkb code 193
#   KEY_F16 -> 186 -> xkb code 194

bind = , code:192, workspace, e-1      # top-left thumb     (btn4)  -> workspace LEFT (prev)
bind = , code:194, workspace, e+1      # top-right thumb    (btn6)  -> workspace RIGHT (next)
bind = , code:191, cyclenext, prev     # bottom-left thumb  (btn3)  -> previous window (cycles)
bind = , code:193, cyclenext           # bottom-right thumb (btn5)  -> next window (cycles)

# Wheel tilt -> Omarchy's universal copy/paste (Ctrl+Insert / Shift+Insert).
# Using F23/F24 (codes 201/202) instead of F19/F20: some xkb layouts
# alias the F20 keycode (198) to the XF86AudioMicMute keysym, which
# Omarchy binds to mic mute — tilting the wheel right toggled the mic
# as a side effect. F23/F24 don't collide with any media-key keysym.
# Note: Omarchy uses SUPER+SHIFT+code:201 for the Omarchy menu, but
# bare code:201 (no modifier) is free for us.
#   KEY_F23 -> kernel 193 -> xkb code 201
#   KEY_F24 -> kernel 194 -> xkb code 202
bind = , code:201, sendshortcut, CTRL,  Insert, activewindow   # wheel tilt LEFT  (btn9)  -> copy
bind = , code:202, sendshortcut, SHIFT, Insert, activewindow   # wheel tilt RIGHT (btn10) -> paste

# Cursor warps to the focused window when switching workspaces.
# cyclenext also warps the cursor by default (controlled by cursor:no_warps,
# which is false by default in Hyprland 0.55+).
cursor {
  warp_on_change_workspace = 1
}
